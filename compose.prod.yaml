services:
    app-backend-gaz:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                CACHEBUST: ${CACHEBUST:-1}
        image: rag-system:latest
        restart: unless-stopped
        expose:
            - '80'
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.botsync.rule=Host(`api.gaztochka.ru`) || Host(`admin.gaztochka.ru`)'
            - 'traefik.http.routers.botsync.entrypoints=websecure'
            - 'traefik.http.routers.botsync.tls.certresolver=letsencrypt'
            - 'traefik.http.services.botsync.loadbalancer.server.port=80'
        env_file:
            - .env
        environment:
            APP_ENV: production
            APP_DEBUG: false
        volumes:
            - 'app-storage:/var/www/html/storage/app'
            - 'app-logs:/var/www/html/storage/logs'
            - 'uploads:/var/www/html/public/uploads'
        networks:
          - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
    app-storage:
        driver: local
    app-logs:
        driver: local
    uploads:
         driver: local
