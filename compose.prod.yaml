services:
    app-backend-gaz:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                CACHEBUST: ${CACHEBUST:-1}
        image: backend-gaztochka:latest
        restart: unless-stopped
        expose:
            - '80'
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.backend_gaz.rule=Host(`backend.gaztochka.ru`)'
            - 'traefik.http.routers.backend_gaz.entrypoints=websecure'
            - 'traefik.http.routers.backend_gaz.tls.certresolver=letsencrypt'
            - 'traefik.http.services.backend_gaz.loadbalancer.server.port=80'
            - 'traefik.http.routers.backend_gaz_http.rule=Host(`backend.gaztochka.ru`)'
            - 'traefik.http.routers.backend_gaz_http.entrypoints=web'
            - 'traefik.http.routers.backend_gaz_http.middlewares=redirect-to-https'
            - 'traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https'
        env_file:
            - .env
        environment:
            APP_ENV: production
            APP_DEBUG: false
        volumes:
            - 'app-storage:/var/www/html/storage/app'
            - 'app-logs:/var/www/html/storage/logs'
            - 'uploads:/var/www/html/public/uploads'
        networks:
          - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
    app-storage:
        driver: local
    app-logs:
        driver: local
    uploads:
         driver: local
